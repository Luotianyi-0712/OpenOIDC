name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example v1.11
        required: true
        type: string
      prerelease:
        description: Mark as prerelease
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.inputs.version }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: npm ci && npm run build
        working-directory: frontend

      - name: Normalize release version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          VERSION="${VERSION#v}"
          echo "RELEASE_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=v$VERSION" >> "$GITHUB_ENV"

      - name: Build Windows executable
        run: GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -trimpath -ldflags "-s -w -X github.com/anthropic/oidc-platform/internal/version.Version=${{ env.RELEASE_TAG }}" -o release/oidc.exe ./cmd/server

      - name: Package release
        run: |
          mkdir -p release/OpenOIDC-windows-amd64
          cp release/oidc.exe release/OpenOIDC-windows-amd64/oidc.exe
          cp -R frontend/dist release/OpenOIDC-windows-amd64/dist
          cd release
          zip -r OpenOIDC-windows-amd64.zip OpenOIDC-windows-amd64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: OpenOIDC ${{ env.RELEASE_TAG }}
          prerelease: ${{ github.event.inputs.prerelease }}
          generate_release_notes: true
          files: release/OpenOIDC-windows-amd64.zip
